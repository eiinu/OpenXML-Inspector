<svg xmlns="http://www.w3.org/2000/svg" width="512" height="512" viewBox="0 0 512 512">
  <!-- 文档背景 -->
  <rect x="80" y="80" width="352" height="352" rx="8" fill="#ffffff" stroke="#e2e8f0" stroke-width="8"/>
  
  <!-- 文档线条 -->
  <line x1="120" y1="120" x2="392" y2="120" stroke="#cbd5e1" stroke-width="2"/>
  <line x1="120" y1="150" x2="392" y2="150" stroke="#cbd5e1" stroke-width="2"/>
  <line x1="120" y1="180" x2="392" y2="180" stroke="#cbd5e1" stroke-width="2"/>
  <line x1="120" y1="210" x2="392" y2="210" stroke="#cbd5e1" stroke-width="2"/>
  
  <!-- XML 代码 -->
  <text x="130" y="250" font-family="monospace" font-size="24" fill="#3b82f6">
    &lt;document&gt;
  </text>
  <text x="150" y="280" font-family="monospace" font-size="24" fill="#3b82f6">
    &lt;body&gt;
  </text>
  <text x="170" y="310" font-family="monospace" font-size="24" fill="#10b981">
    &lt;paragraph&gt;
  </text>
  <text x="150" y="340" font-family="monospace" font-size="24" fill="#3b82f6">
    &lt;/body&gt;
  </text>
  <text x="130" y="370" font-family="monospace" font-size="24" fill="#3b82f6">
    &lt;/document&gt;
  </text>
  
  <!-- 放大镜 -->
  <circle cx="400" cy="160" r="40" fill="none" stroke="#3b82f6" stroke-width="8"/>
  <line x1="420" y1="180" x2="460" y2="220" stroke="#3b82f6" stroke-width="8" stroke-linecap="round"/>
  <circle cx="400" cy="160" r="10" fill="#3b82f6"/>
</svg>